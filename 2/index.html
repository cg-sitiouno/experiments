<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Juegos educativos de matemática y lengua para niños."
    />
    <title>Juegos Educativos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="game-select.css" />
  </head>
  <body>
    <section class="game-select" aria-label="Selección de materia">
      <header class="game-select__header">
        <h1>Juegos Educativos</h1>
        <p>Elige tu materia y a aprender jugando.</p>
      </header>

      <div class="game-select__grid">
        <a
          class="game-card game-card--math"
          href="matematica/index.html"
          aria-label="Juegos de Matemática"
        >
          <div class="game-card__art" aria-hidden="true">
            <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img">
              <title>Burbujas con números y operaciones</title>
              <defs>
                <radialGradient id="sm-main" cx="35%" cy="30%" r="65%">
                  <stop offset="0%" stop-color="#e8fffc" />
                  <stop offset="45%" stop-color="#7cffdf" />
                  <stop offset="100%" stop-color="#22d3ee" />
                </radialGradient>
                <radialGradient id="sm-small" cx="35%" cy="28%" r="70%">
                  <stop offset="0%" stop-color="#fff" stop-opacity="0.95" />
                  <stop offset="100%" stop-color="#c4b5fd" />
                </radialGradient>
                <filter id="sm-glow" x="-40%" y="-40%" width="180%" height="180%">
                  <feGaussianBlur stdDeviation="2.5" result="b" />
                  <feMerge>
                    <feMergeNode in="b" />
                    <feMergeNode in="SourceGraphic" />
                  </feMerge>
                </filter>
              </defs>
              <g opacity="0.7">
                <circle cx="28" cy="42" r="2" fill="#f472b6" />
                <circle cx="168" cy="36" r="1.8" fill="#fde047" />
                <circle cx="178" cy="118" r="1.5" fill="#5cffe8" />
                <circle cx="22" cy="150" r="1.6" fill="#a78bfa" />
              </g>
              <g filter="url(#sm-glow)">
                <circle cx="55" cy="148" r="18" fill="url(#sm-small)" stroke="#7cffdf" stroke-width="1.5" opacity="0.95" />
                <text x="55" y="154" text-anchor="middle" font-size="14" font-family="Nunito, sans-serif" font-weight="800" fill="#1e1b4b">30</text>
                <circle cx="148" cy="145" r="16" fill="url(#sm-small)" stroke="#c4b5fd" stroke-width="1.5" opacity="0.92" />
                <text x="148" y="151" text-anchor="middle" font-size="13" font-family="Nunito, sans-serif" font-weight="800" fill="#1e1b4b">7</text>
              </g>
              <g>
                <circle cx="80" cy="115" r="22" fill="url(#sm-small)" stroke="#a78bfa" stroke-width="2" />
                <text x="80" y="122" text-anchor="middle" font-size="16" font-family="Nunito, sans-serif" font-weight="800" fill="#312e81">30</text>
                <text x="110" y="123" text-anchor="middle" font-size="20" font-weight="800" fill="#94a3b8">+</text>
                <circle cx="140" cy="115" r="19" fill="url(#sm-small)" stroke="#f472b6" stroke-width="2" />
                <text x="140" y="122" text-anchor="middle" font-size="15" font-family="Nunito, sans-serif" font-weight="800" fill="#312e81">7</text>
              </g>
              <g filter="url(#sm-glow)">
                <circle cx="108" cy="66" r="40" fill="url(#sm-main)" stroke="#0e7490" stroke-width="2.5" />
                <text x="108" y="79" text-anchor="middle" font-size="28" font-family="Nunito, sans-serif" font-weight="800" fill="#0f172a">37</text>
              </g>
            </svg>
          </div>
          <h2 class="game-card__title">Matemática</h2>
          <p class="game-card__tagline">Burbujas, números y cálculo mental</p>
        </a>

        <a
          class="game-card game-card--lengua"
          href="lengua/index.html"
          aria-label="Juegos de Lengua"
        >
          <div class="game-card__art" aria-hidden="true">
            <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img">
              <title>Letras y libro mágico</title>
              <defs>
                <linearGradient id="sl-book" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#4c1d95" />
                  <stop offset="100%" stop-color="#1e1b4b" />
                </linearGradient>
                <filter id="sl-glow" x="-40%" y="-40%" width="180%" height="180%">
                  <feGaussianBlur stdDeviation="2.5" result="b" />
                  <feMerge>
                    <feMergeNode in="b" />
                    <feMergeNode in="SourceGraphic" />
                  </feMerge>
                </filter>
              </defs>
              <!-- Libro -->
              <rect x="50" y="118" width="100" height="55" rx="6" fill="url(#sl-book)" stroke="#7c3aed" stroke-width="1.5" />
              <path d="M100 121 L58 125 L58 168 L100 163 Z" fill="#6d28d9" stroke="#8b5cf6" stroke-width="1" />
              <path d="M100 121 L142 125 L142 168 L100 163 Z" fill="#7c3aed" stroke="#8b5cf6" stroke-width="1" />
              <line x1="100" y1="121" x2="100" y2="163" stroke="#a78bfa" stroke-width="2" />
              <!-- Letra A -->
              <circle cx="68" cy="74" r="26" fill="#ec4899" fill-opacity="0.22" stroke="#f9a8d4" stroke-width="1.5" filter="url(#sl-glow)" />
              <text x="68" y="83" text-anchor="middle" font-size="26" font-family="Nunito, sans-serif" font-weight="800" fill="#fce7f3">A</text>
              <!-- Letra E -->
              <circle cx="132" cy="67" r="23" fill="#10b981" fill-opacity="0.28" stroke="#6ee7b7" stroke-width="1.5" filter="url(#sl-glow)" />
              <text x="132" y="75" text-anchor="middle" font-size="22" font-family="Nunito, sans-serif" font-weight="800" fill="#d1fae5">E</text>
              <!-- Letra I -->
              <circle cx="158" cy="112" r="18" fill="#f59e0b" fill-opacity="0.32" stroke="#fde68a" stroke-width="1.5" />
              <text x="158" y="120" text-anchor="middle" font-size="18" font-family="Nunito, sans-serif" font-weight="800" fill="#fef3c7">I</text>
              <!-- partículas -->
              <circle cx="38" cy="98" r="2" fill="#f472b6" opacity="0.8" />
              <circle cx="168" cy="52" r="1.8" fill="#6ee7b7" opacity="0.8" />
              <circle cx="42" cy="155" r="1.5" fill="#a78bfa" opacity="0.7" />
              <circle cx="170" cy="148" r="1.4" fill="#fde047" opacity="0.7" />
            </svg>
          </div>
          <h2 class="game-card__title">Lengua</h2>
          <p class="game-card__tagline">Tiempos verbales, sílabas y más</p>
        </a>
      </div>
    </section>
  </body>
</html>
