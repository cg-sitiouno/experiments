<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Fuerza Vocal — clasifica vocales como fuertes (a, e, o) o débiles (i, u)." />
    <title>Fuerza Vocal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>

    <!-- INICIO -->
    <section id="screen-start" class="screen screen--start" aria-label="Inicio">
      <a href="../index.html" class="link-hub">← Lengua Lab</a>
      <div class="start-art" aria-hidden="true">
        <span class="gem gem--strong">A</span>
        <span class="gem gem--strong">E</span>
        <span class="gem gem--weak">i</span>
        <span class="gem gem--strong">O</span>
        <span class="gem gem--weak">u</span>
      </div>
      <h1 class="start-title">Fuerza Vocal</h1>
      <p class="start-desc">
        Las vocales <strong>a, e, o</strong> son <strong>fuertes</strong>.<br>
        Las vocales <strong>i, u</strong> son <strong>débiles</strong>.<br>
        ¡Clasifícalas!
      </p>
      <div class="level-grid" role="group" aria-label="Elige un nivel">
        <button type="button" class="btn-level" data-level="1">
          <span class="btn-level__name">Nivel 1</span>
          <span class="btn-level__hint">Palabras cortas y conocidas</span>
        </button>
        <button type="button" class="btn-level" data-level="2">
          <span class="btn-level__name">Nivel 2</span>
          <span class="btn-level__hint">Palabras más largas</span>
        </button>
        <button type="button" class="btn-level" data-level="3">
          <span class="btn-level__name">Nivel 3</span>
          <span class="btn-level__hint">Vocales en diptongos</span>
        </button>
      </div>
    </section>

    <!-- JUEGO -->
    <section id="screen-game" class="screen screen--game" hidden aria-label="Partida">
      <div class="hud" role="status" aria-live="polite">
        <span class="hud__item">
          <span class="hud__label">Puntos</span>
          <span class="hud__value hud__value--gold" id="hud-points">0</span>
        </span>
        <span class="hud__item">
          <span class="hud__label">Ronda</span>
          <span class="hud__value" id="hud-round">1 / 10</span>
        </span>
        <span class="hud__item">
          <span class="hud__value hud__value--level" id="hud-level">Nivel 1</span>
        </span>
      </div>

      <div class="vowel-stage" aria-live="polite">
        <div class="vowel-display" id="vowel-display"></div>
        <p class="vowel-context">como en <strong id="vowel-word"></strong></p>
      </div>

      <div class="choices" role="group" aria-label="Clasifica la vocal">
        <button type="button" class="choice choice--strong" data-answer="fuerte">
          <span class="choice__icon">🔥</span>
          <span class="choice__label">Fuerte</span>
        </button>
        <button type="button" class="choice choice--weak" data-answer="debil">
          <span class="choice__icon">💧</span>
          <span class="choice__label">Débil</span>
        </button>
      </div>

      <div id="feedback-bar" class="feedback-bar" hidden role="alert">
        <span id="feedback-text"></span>
      </div>

      <footer class="game-footer">
        <button type="button" class="btn-ghost" id="btn-menu">← Menú</button>
        <a class="btn-ghost" href="../index.html">Lengua Lab</a>
      </footer>
    </section>

    <!-- RESULTADO -->
    <section id="screen-result" class="screen screen--result" hidden aria-label="Resultado">
      <h2 class="result-title">¡Misión completada!</h2>
      <div class="result-stars" id="result-stars"></div>
      <div class="result-points" id="result-points"></div>
      <p class="result-msg" id="result-msg"></p>
      <div class="result-actions">
        <button type="button" class="btn-primary" id="btn-play-again">Jugar de nuevo</button>
        <a class="btn-secondary" href="../index.html">← Lengua Lab</a>
      </div>
    </section>

    <script src="data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
