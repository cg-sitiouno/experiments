<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Tren de Sílabas — clasifica palabras según su número de sílabas." />
    <title>Tren de Sílabas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>

    <!-- INICIO -->
    <section id="screen-start" class="screen screen--start" aria-label="Inicio">
      <a href="../index.html" class="link-hub">← Lengua Lab</a>
      <div class="train-art" aria-hidden="true">
        <span class="wagon">1</span>
        <span class="wagon">2</span>
        <span class="wagon wagon--active">3</span>
        <span class="wagon">4+</span>
      </div>
      <h1 class="start-title">Tren de Sílabas</h1>
      <p class="start-desc">
        Cada palabra sube a un vagón según sus sílabas.<br>
        ¿Cuántas sílabas tiene?
      </p>
      <div class="level-grid" role="group" aria-label="Elige un nivel">
        <button type="button" class="btn-level" data-level="1">
          <span class="btn-level__name">Nivel 1</span>
          <span class="btn-level__hint">Palabras simples y conocidas</span>
        </button>
        <button type="button" class="btn-level" data-level="2">
          <span class="btn-level__name">Nivel 2</span>
          <span class="btn-level__hint">Palabras más variadas</span>
        </button>
        <button type="button" class="btn-level" data-level="3">
          <span class="btn-level__name">Nivel 3</span>
          <span class="btn-level__hint">Esdrújulas y polisílabas</span>
        </button>
      </div>
    </section>

    <!-- JUEGO -->
    <section id="screen-game" class="screen screen--game" hidden aria-label="Partida">
      <div class="hud" role="status" aria-live="polite">
        <span class="hud__item">
          <span class="hud__label">Puntos</span>
          <span class="hud__value hud__value--gold" id="hud-points">0</span>
        </span>
        <span class="hud__item">
          <span class="hud__label">Ronda</span>
          <span class="hud__value" id="hud-round">1 / 10</span>
        </span>
        <span class="hud__item">
          <span class="hud__value hud__value--level" id="hud-level">Nivel 1</span>
        </span>
      </div>

      <div class="word-stage" aria-live="polite">
        <p class="word-display" id="word-display"></p>
        <p class="syllable-hint" id="syllable-hint"></p>
      </div>

      <div class="wagons" role="group" aria-label="Número de sílabas">
        <button type="button" class="wagon-btn" data-answer="1">
          <span class="wagon-btn__num">1</span>
          <span class="wagon-btn__name">Monosílaba</span>
        </button>
        <button type="button" class="wagon-btn" data-answer="2">
          <span class="wagon-btn__num">2</span>
          <span class="wagon-btn__name">Bisílaba</span>
        </button>
        <button type="button" class="wagon-btn" data-answer="3">
          <span class="wagon-btn__num">3</span>
          <span class="wagon-btn__name">Trisílaba</span>
        </button>
        <button type="button" class="wagon-btn" data-answer="4">
          <span class="wagon-btn__num">4+</span>
          <span class="wagon-btn__name">Polisílaba</span>
        </button>
      </div>

      <div id="feedback-bar" class="feedback-bar" hidden role="alert">
        <span id="feedback-text"></span>
      </div>

      <footer class="game-footer">
        <button type="button" class="btn-ghost" id="btn-menu">← Menú</button>
        <a class="btn-ghost" href="../index.html">Lengua Lab</a>
      </footer>
    </section>

    <!-- RESULTADO -->
    <section id="screen-result" class="screen screen--result" hidden aria-label="Resultado">
      <h2 class="result-title">¡Tren completado!</h2>
      <div class="result-stars" id="result-stars"></div>
      <div class="result-points" id="result-points"></div>
      <p class="result-msg" id="result-msg"></p>
      <div class="result-actions">
        <button type="button" class="btn-primary" id="btn-play-again">Jugar de nuevo</button>
        <a class="btn-secondary" href="../index.html">← Lengua Lab</a>
      </div>
    </section>

    <script src="data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
