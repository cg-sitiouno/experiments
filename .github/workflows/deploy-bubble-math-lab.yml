# Publica el portal educativo completo en GitHub Pages.
#
# Estructura desplegada:
#   /                  → selector de materias (Matemática / Lengua)
#   /matematica/       → hub de matemática + bubble-math-lab + mystery-box
#   /lengua/           → hub de lengua + 5 juegos (máquina del tiempo, cazador de
#                        sílabas, fuerza vocal, tren de sílabas, misión c/s/z)
#
# Tras el push: Repo → Settings → Pages → Source: GitHub Actions.
# URL típica: https://<usuario>.github.io/experiments/

name: Deploy portal educativo

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-experiments-hub
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prepare site
        run: |
          mkdir -p _site
          cp 2/index.html 2/game-select.css _site/
          cp -r 2/matematica _site/
          cp -r 2/lengua _site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
