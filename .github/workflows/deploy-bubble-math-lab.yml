# Publica el hub de juegos (selector) + Bubble Math Lab + Mystery Box en GitHub Pages.
# Se arma _site/ solo con index.html, game-select.css y las dos carpetas de juego
# (no se suben specs ni markdown internos).
#
# Tras el push: Repo → Settings → Pages → Source: GitHub Actions.
# URL típica: https://<usuario>.github.io/experiments/
#
# Enlaces relativos: bubble-math-lab/, mystery-box/, game-select.css en la raíz del deploy.

name: Deploy math games hub

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-experiments-hub
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prepare site (hub + juegos, sin specs ni planes)
        run: |
          mkdir -p _site
          cp -f 2/index.html 2/game-select.css _site/
          cp -r 2/bubble-math-lab 2/mystery-box _site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
